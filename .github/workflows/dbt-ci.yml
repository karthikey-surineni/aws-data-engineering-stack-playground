name: dbt CI

on:
  pull_request:
    paths:
      - "transforms/**"
  push:
    branches: [main]
    paths:
      - "transforms/**"

defaults:
  run:
    working-directory: transforms/market_data_transforms

jobs:
  dbt-project-evaluator:
    name: dbt project evaluator
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dbt with DuckDB adapter
        run: uv tool install dbt-core --with dbt-duckdb

      - name: Create CI profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          market_data_transforms:
            target: ci
            outputs:
              ci:
                type: duckdb
                path: ":memory:"
                threads: 4
          EOF

      - name: Install dbt packages
        run: dbt deps

      - name: Run project evaluator
        run: dbt build --select package:dbt_project_evaluator
